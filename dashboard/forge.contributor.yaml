  - id: cortex-active-checkpoints
    title: "Active Checkpoints"
    description: "Pending human-in-the-loop checkpoints"
    size: md
    refresh_sec: 10

settings:
  - id: cortex-config
    title: "Engine Settings"
    description: "Configure Cortex engine behavior"
    group: Cortex
    icon: bot

searchable: true
